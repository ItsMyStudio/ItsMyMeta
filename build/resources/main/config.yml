# Database storage for runtime values and leaderboard cache.
database:
  type: sqlite

  sqlite:
    file: data.db

  mysql:
    host: localhost
    port: 3306
    database: itsmymeta
    username: root
    password: change-me

# Meta definitions are the schema of your plugin.
# `type` controls parsing.
# `scope` controls who shares the same value.
# `default` can use PlaceholderAPI for string metas and for dynamic number expressions.
# `decimal` only applies to `type: number`.
# `leaderboard` is optional and only applies to number metas.
meta-definitions:
  server_name:
    type: string
    scope: global
    default: "ItsMyMeta"

  coins:
    type: number
    decimal: false
    scope: player
    default: 0
    min: 0
    max: 1000000
    leaderboard:
      enabled: true
      exact-rank-limit: 1000
      dynamic-refresh-minutes: 5

  pvp_enabled:
    type: string
    scope: world
    default: "true"

  island_tax:
    type: number
    decimal: false
    scope: superiorskyblock
    default: 100
    min: 0
    max: 10000
    leaderboard:
      enabled: true
      exact-rank-limit: 1000
      dynamic-refresh-minutes: 0
