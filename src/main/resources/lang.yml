prefix: "<gradient:#ffb703:#fb8500><b>ItsMyMeta</b></gradient> <white>┃</white>"

logs:
  plugin-enabled: "Loaded <count> meta definition(s) using <database_type>."
  plugin-reloaded: "Reloaded the configuration, language file, and <count> meta definition(s)."
  placeholderapi-registered: "Registered the PlaceholderAPI expansion."
  leaderboards-enabled: "Configured <count> leaderboard-enabled meta(s)."
  dynamic-leaderboard-refresh: "Dynamic leaderboard values will refresh every <minutes> minute(s) at minimum."

messages:
  common:
    none: "Not set"

  errors:
    generic: "<prefix> An error occurred. <br><gray><message></gray>"
    no-permission: "<prefix> You do not have permission to use this command."
    unknown-subcommand: "<prefix> The subcommand <yellow><input></yellow> is not valid. <br><gray>Available subcommands: <subcommands></gray>"
    incorrect-command: "<prefix> This command is not valid. <br><gray>Please use /<label> <usage></gray>"

  descriptions:
    get: "Show the current value of a meta."
    set: "Set a meta to a new value."
    give: "Add a numeric amount to a meta."
    take: "Remove a numeric amount from a meta."
    reset: "Reset a meta to its default value."
    info: "Show the configuration of a meta."
    list: "Show all configured metas."
    reload: "Reload the configuration and language files."
    help: "Show the available subcommands."

  commands:
    get:
      value: "<prefix> The value of <aqua><meta_key></aqua> for <yellow><target></yellow> is <green><value></green>."
    set:
      success: "<prefix> Set <aqua><meta_key></aqua> for <yellow><target></yellow> to <green><value></green>."
    give:
      success: "<prefix> Added <green><amount></green> to <aqua><meta_key></aqua> for <yellow><target></yellow>. <gray>(<value>)</gray>"
    take:
      success: "<prefix> Removed <green><amount></green> from <aqua><meta_key></aqua> for <yellow><target></yellow>. <gray>(<value>)</gray>"
    reset:
      success: "<prefix> Reset <aqua><meta_key></aqua> for <yellow><target></yellow> to <green><value></green>."
    list:
      value: "<prefix> The configured metas are:</white> <aqua><metas></aqua>"
    reload:
      success: "<prefix> The plugin configuration has been <green>reloaded</green>."
    help:
      header: "<prefix> Available commands:</white>"
      entry: "<white> • /<label> <usage></white> <dark_gray>-</dark_gray> <gray><description></gray>"
    info:
      - "<prefix> Meta information for <aqua><meta_key></aqua>:"
      - "<white> • Type:</white> <yellow><meta_type></yellow>"
      - "<white> • Scope:</white> <yellow><scope></yellow>"
      - "<white> • Default value:</white> <green><default></green>"
      - "<white> • Minimum value:</white> <green><min></green>"
      - "<white> • Maximum value:</white> <green><max></green>"
