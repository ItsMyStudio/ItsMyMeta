name: ItsMyData
version: '1.0-SNAPSHOT'
main: studio.itsmy.itsmydata.ItsMyDataPlugin
api-version: '1.21'
softdepend: [PlaceholderAPI, SuperiorSkyblock2]
commands:
  data:
    description: Inspect or update configured data values
    usage: /data help
permissions:
  itsmydata.command.help:
    description: View the data command help.
    default: true
  itsmydata.command.get:
    description: Read scoped data values.
    default: true
  itsmydata.command.info:
    description: View data definitions.
    default: true
  itsmydata.command.list:
    description: List configured data values.
    default: true
  itsmydata.command.set:
    description: Set scoped data values.
    default: op
  itsmydata.command.give:
    description: Add numeric amounts to data values.
    default: op
  itsmydata.command.take:
    description: Remove numeric amounts from data values.
    default: op
  itsmydata.command.reset:
    description: Reset data values to their defaults.
    default: op
  itsmydata.command.reload:
    description: Reload plugin config and language files.
    default: op
